<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Assist Settings</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        background: #111;
        color: #f5f5f5;
      }
      label {
        display: block;
        margin-top: 12px;
      }
      input[type="text"],
      input[type="password"],
      select {
        width: 100%;
        margin-top: 4px;
      }
      button {
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <h1>Input Assist</h1>
    <form id="settings-form">
      <label>
        ElevenLabs API key
        <input id="api-key" type="password" autocomplete="off" />
      </label>
      <label>
        <input id="noise-gate" type="checkbox" />
        Noise gate
      </label>
      <label>
        <input id="show-partial" type="checkbox" />
        Show partial transcript
      </label>
      <label>
        Activation mode
        <select id="activation-mode">
          <option value="push-to-talk">Push-to-talk</option>
          <option value="toggle">Toggle</option>
        </select>
      </label>
      <label>
        Language hint
        <select id="language-hint">
          <option value="auto">Auto</option>
          <option value="en">English</option>
          <option value="fi">Finnish</option>
        </select>
      </label>
      <label>
        Personal dictionary
        <textarea id="personal-dictionary" rows="4"></textarea>
      </label>
      <label>
        Technical dictionary
        <textarea id="technical-dictionary" rows="4"></textarea>
      </label>
      <label>
        Ignore list
        <textarea id="ignore-list" rows="4"></textarea>
      </label>
      <button type="submit">Save</button>
    </form>
    <p id="save-status"></p>
    <section id="diagnostics">
      <h2>Diagnostics</h2>
      <p id="bridge-status"></p>
      <button type="button" id="copy-debug-bundle">Copy debug bundle</button>
      <p id="debug-status"></p>
    </section>
    <script type="module" src="/src/settingsMain.ts"></script>
  </body>
</html>
