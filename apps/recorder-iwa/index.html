<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Assist Recorder</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        background: #111;
        color: #f5f5f5;
      }
      #status {
        font-size: 14px;
      }
      #partial {
        opacity: 0.8;
        min-height: 1.2em;
      }
      #level {
        height: 4px;
        background: #333;
        margin-top: 8px;
      }
      #level > span {
        display: block;
        height: 100%;
        width: 0;
        background: #4ade80;
      }
    </style>
  </head>
  <body>
    <div id="status">Idle</div>
    <div id="partial"></div>
    <div id="level"><span></span></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
